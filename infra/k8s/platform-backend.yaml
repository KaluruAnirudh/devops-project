apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgeops-backend
  namespace: devops-platform
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: forgeops-backend
  template:
    metadata:
      labels:
        app: forgeops-backend
    spec:
      restartPolicy: Always
      containers:
        - name: forgeops-backend
          image: ghcr.io/your-org/forgeops-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: forgeops-backend-env
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: forgeops-backend
  namespace: devops-platform
spec:
  type: ClusterIP
  selector:
    app: forgeops-backend
  ports:
    - name: http
      port: 4000
      targetPort: 4000

